<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ede9f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="J&B Budget">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>J&B Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f3f0fb;
  --surface: #ffffff;
  --surface2: #ede9f8;
  --border: rgba(139,111,211,0.15);
  --border2: rgba(139,111,211,0.28);
  --text: #2d1f5e;
  --muted: #9585c0;
  --accent: #7c5cbf;
  --accent2: #6941c6;
  --green: #0d9e6e;
  --red: #dc3545;
  --pink: #c026a0;
  --jacob: #6941c6;
  --b: #c026a0;
  --shared: #0d9e6e;
  --radius: 16px;
  --radius-sm: 10px;
  --font-display: 'DM Serif Display', serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overscroll-behavior: none; }
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }
.header { padding: 52px 20px 14px; background: var(--bg); flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.app-title { font-family: var(--font-display); font-size: 26px; letter-spacing: -0.5px; }
.app-title span { color: var(--accent2); font-style: italic; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 5px; transition: background 0.3s; }
.status-dot.live { background: var(--green); }
.status-dot.error { background: var(--red); }
.status-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; }
.content { flex: 1; overflow-y: auto; padding: 0 20px 100px; -webkit-overflow-scrolling: touch; }
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border2); display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 100; box-shadow: 0 -4px 20px rgba(105,65,198,0.07); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 6px 4px; color: var(--muted); font-family: var(--font-body); transition: color 0.2s; }
.nav-btn.active { color: var(--accent2); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }

/* Budget */
.budget-header { background: linear-gradient(135deg, var(--surface2) 0%, #e4dcf5 100%); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; }
.budget-available { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.budget-avail-card { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; }
.budget-avail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.budget-avail-val { font-size: 20px; font-weight: 600; font-family: var(--font-display); }
.progress-bar-wrap { background: var(--bg); border-radius: 999px; height: 8px; margin: 6px 0 4px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
.prog-green { background: var(--green); }
.prog-amber { background: #f59e0b; }
.prog-red { background: var(--red); }
.budget-cat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
.budget-cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.budget-cat-name { font-size: 13px; font-weight: 500; color: var(--text); }
.budget-cat-amounts { font-size: 12px; color: var(--muted); }
.budget-cat-amounts span { font-weight: 600; color: var(--text); }
.budget-edit-row { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
.budget-edit-row input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 6px 10px; color: var(--text); font-family: var(--font-body); font-size: 13px; outline: none; }
.budget-edit-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px 6px; }

/* Debt tracker */
.debt-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; }
.debt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.debt-name { font-size: 14px; font-weight: 500; color: var(--text); }
.debt-balance { font-size: 16px; font-weight: 600; color: var(--red); }
.debt-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.debt-progress { margin-bottom: 6px; }
.debt-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.debt-actions input { flex: 1; min-width: 80px; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 6px 10px; color: var(--text); font-family: var(--font-body); font-size: 12px; outline: none; }
.debt-actions button { background: var(--accent); border: none; border-radius: 8px; padding: 6px 12px; color: white; font-family: var(--font-body); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.debt-actions button.ghost { background: none; border: 1px solid var(--border2); color: var(--muted); }

/* Scanner */
.scan-btn { width:100%; background:var(--surface); border:1.5px dashed var(--border2); border-radius:var(--radius); padding:16px; color:var(--accent2); font-family:var(--font-body); font-size:14px; font-weight:500; cursor:pointer; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
.scan-btn:active { background:var(--surface2); }
.scan-preview { width:100%; border-radius:var(--radius-sm); margin-bottom:10px; max-height:200px; object-fit:cover; }
.scan-result { background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
.scan-result-title { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
.scan-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:0.5px solid var(--border); }
.scan-item:last-child { border-bottom:none; }
.scan-item input { background:var(--bg); border:1px solid var(--border2); border-radius:8px; padding:6px 8px; color:var(--text); font-family:var(--font-body); font-size:13px; outline:none; }
.scan-item input.name-in { flex:1; }
.scan-item input.amt-in { width:80px; }
.scan-item select { background:var(--bg); border:1px solid var(--border2); border-radius:8px; padding:6px 8px; color:var(--text); font-family:var(--font-body); font-size:12px; outline:none; -webkit-appearance:none; }
.scan-item-del { background:none; border:none; cursor:pointer; color:var(--muted); font-size:15px; padding:2px 6px; }
.scan-item-del:active { color:var(--red); }
.analyzing { text-align:center; padding:20px; color:var(--muted); font-size:13px; }
.api-key-note { font-size:11px; color:var(--muted); text-align:center; margin-top:6px; }
.api-key-note a { color:var(--accent2); cursor:pointer; }

/* Setup screen */
.setup-screen { padding: 24px 0; }
.setup-card { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
.setup-card h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.setup-card p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
.setup-card a { color: var(--accent2); }
.step-badge { background: var(--accent); color: white; font-size: 11px; font-weight: 700; border-radius: 20px; padding: 2px 10px; display: inline-block; margin-bottom: 10px; letter-spacing: 0.3px; }
.form-field { margin-bottom: 12px; }
.form-field label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
.form-field input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: var(--font-body); font-size: 13px; outline: none; }
.form-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(105,65,198,0.1); }
.form-field input::placeholder { color: var(--muted); font-size: 12px; }
.save-btn { width: 100%; background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 13px; color: white; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.save-btn:active { opacity: 0.8; }
.info-box { background: rgba(105,65,198,0.07); border: 1px solid rgba(105,65,198,0.2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 12px; color: var(--accent2); line-height: 1.6; margin-bottom: 12px; }

/* Metrics */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.metric-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.metric-value { font-family: var(--font-display); font-size: 22px; letter-spacing: -0.5px; }
.metric-value.green { color: var(--green); }
.metric-value.red { color: var(--red); }
.metric-value.pink { color: var(--pink); }

/* Settlement */
.settle-box { background: linear-gradient(135deg, #ede9f8 0%, #e4dcf5 100%); border: 1px solid var(--border2); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; text-align: center; }
.settle-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.settle-amount { font-family: var(--font-display); font-size: 34px; letter-spacing: -1px; margin-bottom: 4px; }
.settle-sub { font-size: 12px; color: var(--muted); }

/* List items */
.section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin: 18px 0 9px; }
.item-list { display: flex; flex-direction: column; gap: 7px; }
.item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; display: flex; align-items: center; gap: 9px; }
.item-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.item-dot.jacob { background: var(--jacob); }
.item-dot.b { background: var(--b); }
.item-dot.shared { background: var(--shared); }
.item-left { flex: 1; min-width: 0; }
.item-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.item-amount { font-size: 14px; font-weight: 600; color: var(--red); flex-shrink: 0; }
.item-amount.income { color: var(--green); }
.item-del { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; border-radius: 6px; font-size: 15px; flex-shrink: 0; }
.item-del:active { color: var(--red); }
.badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
.badge.jacob { background: rgba(105,65,198,0.12); color: var(--accent2); }
.badge.b { background: rgba(192,38,160,0.12); color: var(--pink); }
.badge.shared { background: rgba(13,158,110,0.12); color: var(--shared); }
.empty-state { text-align: center; padding: 28px 20px; color: var(--muted); font-size: 13px; }
.empty-state .emoji { font-size: 28px; margin-bottom: 8px; }

/* Add form */
.add-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 14px; }
.form-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 11px; }
.form-field2 { margin-bottom: 9px; }
.form-field2 label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
.form-field2 input, .form-field2 select { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 9px 11px; color: var(--text); font-family: var(--font-body); font-size: 13px; outline: none; -webkit-appearance: none; appearance: none; }
.form-field2 input:focus, .form-field2 select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(105,65,198,0.1); }
.form-field2 input::placeholder { color: var(--muted); }
.form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.add-btn { width: 100%; background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 11px; color: white; font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 3px; transition: opacity 0.2s; }
.add-btn:active { opacity: 0.8; }
.info-note { background: rgba(105,65,198,0.07); border: 1px solid rgba(105,65,198,0.2); border-radius: var(--radius-sm); padding: 9px 13px; font-size: 12px; color: var(--accent2); margin-bottom: 12px; line-height: 1.5; }
.section-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; height: 120px; color: var(--muted); font-size: 13px; gap: 10px; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: var(--green); color: #0f1f17; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.toast.err { background: var(--red); color: white; }

/* Month pill */
.month-pill { font-size: 12px; font-weight: 500; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 11px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">J<span>&</span>B <span style="font-style:normal;color:var(--text)">Budget</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="month-pill" id="month-display"></div>
        <div class="status-label"><span class="status-dot" id="status-dot"></span><span id="status-text">connecting…</span></div>
      </div>
    </div>
  </div>
  <div class="content" id="content"><div class="setup-screen" id="initial-setup" style="display:none"><div class="info-box">Connect your Supabase database to sync between both phones.</div><div class="setup-card"><div class="step-badge">PASTE YOUR KEYS</div><h2>Enter your Supabase details</h2><p>Go to <a href="https://supabase.com" target="_blank">supabase.com</a> → your project → Settings → API Keys → Legacy tab. Copy the Project URL and anon public key.</p><div class="form-field"><label>Project URL</label><input id="sb-url" placeholder="https://xxxx.supabase.co" /></div><div class="form-field"><label>Anon public key</label><input id="sb-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9…" /></div><button class="save-btn" onclick="saveConfig()">Connect & Save →</button></div></div></div>
  <nav class="nav" id="main-nav" style="display:none;">
    <button class="nav-btn active" id="nav-overview" onclick="showPage('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Overview</span>
    </button>
    <button class="nav-btn" id="nav-bills" onclick="showPage('bills')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Bills</span>
    </button>
    <button class="nav-btn" id="nav-expenses" onclick="showPage('expenses')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Expenses</span>
    </button>
    <button class="nav-btn" id="nav-income" onclick="showPage('income')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      <span>Income</span>
    </button>
    <button class="nav-btn" id="nav-jacob" onclick="showPage('jacob')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Jacob</span>
    </button>
    <button class="nav-btn" id="nav-b" onclick="showPage('b')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>B</span>
    </button>
    <button class="nav-btn" id="nav-budget" onclick="showPage('budget')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h.01M12 8h5M7 12h3M14 12h3"/></svg>
      <span>Budget</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Config (user fills these in) ──
const CONFIG_KEY = 'jb-supabase-config';
const ANTHROPIC_KEY = 'jb-anthropic-key';
const BUDGET_KEY = 'jb-budget-limits';
const DEBT_KEY = 'jb-debts';
function getDebts() {
  try { return JSON.parse(localStorage.getItem(DEBT_KEY)) || []; }
  catch { return []; }
}
function saveDebts(arr) { localStorage.setItem(DEBT_KEY, JSON.stringify(arr)); }
const DEFAULT_BUDGET = [
  {id:'bg1', name:'Groceries',   category:'groceries', limit:600},
  {id:'bg2', name:'Eating out',  category:'food',      limit:300},
  {id:'bg3', name:'Other shared',category:'shared',    limit:200},
  {id:'bg4', name:'Jacob personal', category:'jacob',  limit:200},
  {id:'bg5', name:'B personal',  category:'b',         limit:200},
];
function getBudget() {
  try { return JSON.parse(localStorage.getItem(BUDGET_KEY)) || DEFAULT_BUDGET; }
  catch { return DEFAULT_BUDGET; }
}
function saveBudget(arr) { localStorage.setItem(BUDGET_KEY, JSON.stringify(arr)); }
const FIXED_KEY = 'jb-fixed-bills';
let sbClient = null;
let currentPage = 'overview';
let data = { bills: [], expenses: [], incomes: [], payments: [] };
let editingFixedId = null;
let editingIncId = null;
let viewMonth = new Date().toISOString().slice(0,7); // 'YYYY-MM'

const DEFAULT_HOME_FIXED = [
  {id:'f1', name:'Mortgage',           amount:2184.00},
  {id:'f2', name:'Mortgage insurance', amount:191.00},
  {id:'f3', name:'Electricity',        amount:180.00},
  {id:'f4', name:'Pest control',       amount:44.29},
  {id:'f5', name:'Trash',              amount:38.00},
  {id:'f6', name:'Internet',           amount:71.40},
];
const DEFAULT_JACOB_FIXED = [
  {id:'j1', name:'Car',           amount:867.00},
  {id:'j2', name:'Student loan',  amount:75.00},
  {id:'j3', name:'Apple',         amount:134.28},
  {id:'j4', name:'Car insurance', amount:200.00},
  {id:'j5', name:'Phone bill',    amount:161.00},
  {id:'j6', name:'Property tax',  amount:291.00},
];
function getFixed() {
  try { return JSON.parse(localStorage.getItem(FIXED_KEY)) || DEFAULT_HOME_FIXED; }
  catch { return DEFAULT_HOME_FIXED; }
}
function getJacobFixed() {
  try {
    const arr = JSON.parse(localStorage.getItem(FIXED_KEY+'_jacob')) || DEFAULT_JACOB_FIXED;
    const now = new Date().toISOString().slice(0,7);
    return arr.filter(b => !b.expiresAt || b.expiresAt >= now);
  } catch { return DEFAULT_JACOB_FIXED; }
}
function saveFixed(arr) { localStorage.setItem(FIXED_KEY, JSON.stringify(arr)); }
function saveJacobFixed(arr) { localStorage.setItem(FIXED_KEY+'_jacob', JSON.stringify(arr)); }
function getBFixed() {
  try {
    const arr = JSON.parse(localStorage.getItem(FIXED_KEY+'_b')) || [];
    const now = new Date().toISOString().slice(0,7);
    return arr.filter(b => !b.expiresAt || b.expiresAt >= now);
  } catch { return []; }
}
function saveBFixed(arr) { localStorage.setItem(FIXED_KEY+'_b', JSON.stringify(arr)); }
let bFixedNextId = Date.now();

const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('month-display').textContent = months[new Date().getMonth()] + ' ' + new Date().getFullYear();
// Set today as default payment date when page loads
function setPayDateDefault() {
  const today = new Date().toISOString().split('T')[0];
  const payEl = document.getElementById('pay-date');
  if(payEl && !payEl.value) payEl.value = today;
  const expEl = document.getElementById('exp-date');
  if(expEl && !expEl.value) expEl.value = today;
}

function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtSigned(n) { return (n>=0?'+':'-') + fmt(n); }

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  setTimeout(() => t.className = 'toast', 2200);
}

function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if(state==='live') { dot.className='status-dot live'; txt.textContent='live'; }
  else if(state==='error') { dot.className='status-dot error'; txt.textContent='offline'; }
  else { dot.className='status-dot'; txt.textContent='connecting…'; }
}

async function saveConfig() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  if(!url || !key) { toast('Paste both fields!', true); return; }
  localStorage.setItem(CONFIG_KEY, JSON.stringify({url, key}));
  await initSupabase(url, key);
}

// ── Supabase init ──
async function initSupabase(url, key) {
  try {
    sbClient = window.supabase.createClient(url, key);
    await loadAll();
    subscribeRealtime();
    document.getElementById('main-nav').style.display = 'flex';
    setStatus('live');
    showPage('overview');
  } catch(e) {
    setStatus('error');
    toast('Connection failed — check your keys', true);
    showSetup();
  }
}

async function loadAll() {
  const [b, e, i, p] = await Promise.all([
    sbClient.from('bills').select('*').order('created_at'),
    sbClient.from('expenses').select('*').order('created_at'),
    sbClient.from('incomes').select('*').order('created_at'),
    sbClient.from('payments').select('*').order('paid_at', {ascending: false}),
  ]);
  if(b.error || e.error || i.error) throw new Error('load failed');
  data.bills = b.data || [];
  data.expenses = e.data || [];
  data.incomes = i.data || [];
  data.payments = p.data || [];
}

function subscribeRealtime() {
  sbClient.channel('db-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'bills'}, async () => { await reload('bills'); render(); })
    .on('postgres_changes', {event:'*', schema:'public', table:'expenses'}, async () => { await reload('expenses'); render(); })
    .on('postgres_changes', {event:'*', schema:'public', table:'incomes'}, async () => { await reload('incomes'); render(); })
    .on('postgres_changes', {event:'*', schema:'public', table:'payments'}, async () => { await reload('payments'); render(); })
    .subscribe(status => {
      if(status === 'SUBSCRIBED') setStatus('live');
      else if(status === 'CHANNEL_ERROR') setStatus('error');
    });
}

async function reload(table) {
  const {data: rows} = await sbClient.from(table).select('*').order('created_at');
  data[table] = rows || [];
}

// ── Calculations ──
function calc() {
  let jIncome=0, bIncome=0;
  data.incomes.forEach(i => i.who==='jacob' ? jIncome+=+i.amount : bIncome+=+i.amount);
  let jBillsOwed=0, bBillsOwed=0;
  // Fixed home bills are always shared 60/40
  getFixed().forEach(b => { jBillsOwed+=b.amount*0.6; bBillsOwed+=b.amount*0.4; });
  // Jacob's personal fixed bills
  getJacobFixed().forEach(b => { jBillsOwed+=b.amount; });
  // B's personal fixed bills
  getBFixed().forEach(b => { bBillsOwed+=b.amount; });
  data.bills.forEach(b => {
    if(b.type==='jacob') jBillsOwed+=+b.amount;
    else { jBillsOwed+=b.amount*0.6; bBillsOwed+=b.amount*0.4; }
  });
  const now = new Date();
  const thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const thisMonthExp = data.expenses.filter(e => ((e.expense_date||e.created_at||'').slice(0,7)) === thisMonth);
  const thisMonthPay = data.payments.filter(p => (p.paid_at||'').slice(0,7) === thisMonth);

  let jExpOwed=0, bExpOwed=0;
  thisMonthExp.forEach(e => {
    const s=['groceries','food','shared'].includes(e.type);
    if(s){jExpOwed+=e.amount*0.6;bExpOwed+=e.amount*0.4;}
    else if(e.type==='jacob'||e.type==='jacob_food') jExpOwed+=+e.amount;
    else if(e.type==='b'||e.type==='b_food') bExpOwed+=+e.amount;
  });
  let balance=0;
  thisMonthExp.forEach(e => {
    if(!['groceries','food','shared'].includes(e.type)) return;
    balance += e.paid==='jacob' ? e.amount*0.4 : -e.amount*0.6;
  });
  getFixed().forEach(b => { balance+=b.amount*0.4; });
  data.bills.forEach(b => { if(b.type==='shared') balance+=b.amount*0.4; });
  // Payments reduce the balance
  data.payments.forEach(p => {
    if(p.from_who==='b' && p.to_who==='jacob') balance -= p.amount; // B paid Jacob → reduces what B owes
    if(p.from_who==='jacob' && p.to_who==='b') balance += p.amount; // Jacob paid B → reduces what Jacob owes
  });
  return {jIncome,bIncome,jOut:jBillsOwed+jExpOwed,bOut:bBillsOwed+bExpOwed,balance};
}

}

function startFixedEdit(id) { editingFixedId=id; render(); }
function cancelFixedEdit() { editingFixedId=null; render(); }
function saveFixedEdit(id, type) {
  const name=document.getElementById('fedit-name-'+id).value.trim();
  const amount=parseFloat(document.getElementById('fedit-amt-'+id).value);
  if(!name||isNaN(amount)||amount<=0){toast('Fill in both fields!',true);return;}
  if(type==='jacob') {
    const arr=getJacobFixed();
    const idx=arr.findIndex(b=>b.id===id);
    if(idx>-1){arr[idx].name=name;arr[idx].amount=amount;}
    saveJacobFixed(arr);
  } else if(type==='b') {
    const arr=getBFixed();
    const idx=arr.findIndex(b=>b.id===id);
    if(idx>-1){arr[idx].name=name;arr[idx].amount=amount;}
    saveBFixed(arr);
  } else {
    const arr=getFixed();
    const idx=arr.findIndex(b=>b.id===id);
    if(idx>-1){arr[idx].name=name;arr[idx].amount=amount;}
    saveFixed(arr);
  }
  editingFixedId=null;
  toast('Bill updated ✓');
  render();
}

async function handleScan(event) {
  const file = event.target.files[0];
  if(!file) return;
  const out = document.getElementById('scan-output');
  out.innerHTML = '<div class="analyzing"><div class="spinner" style="margin:0 auto 8px;"></div>Analyzing receipt…</div>';

  // Convert image to base64
  const base64 = await new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });

  const imgUrl = URL.createObjectURL(file);
  const key = localStorage.getItem(ANTHROPIC_KEY);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: file.type, data: base64 }},
            { type: 'text', text: 'Look at this receipt or financial screenshot. Extract each line item or transaction. Return ONLY a JSON array like: [{"name":"Item name","amount":12.34,"category":"groceries"}]. Categories must be one of: groceries, food, shared, jacob, b. Use "groceries" for grocery stores, "food" for restaurants, "shared" for general shared purchases, "jacob" for personal male items, "b" for personal female items. If it is a single total (like a credit card screenshot), return one item with the merchant name and total. No explanation, just the JSON array.' }
          ]
        }]
      })
    });

    const data = await resp.json();
    if(data.error) { toast('API error: ' + data.error.message, true); out.innerHTML=''; return; }

    let items = [];
    try {
      const text = data.content[0].text.trim();
      const clean = text.replace(/```json|```/g,'').trim();
      items = JSON.parse(clean);
    } catch(e) { toast('Could not read receipt — try a clearer photo', true); out.innerHTML=''; return; }

    if(!items.length) { toast('No items found on receipt', true); out.innerHTML=''; return; }

    // Get current paid-by selection
    const paidBy = document.getElementById('exp-paid') ? document.getElementById('exp-paid').value : 'jacob';

    out.innerHTML = `
      <img src="${imgUrl}" class="scan-preview"/>
      <div class="scan-result">
        <div class="scan-result-title">Found ${items.length} item${items.length>1?'s':''} — edit if needed</div>
        ${items.map((item,i) => `
          <div class="scan-item" id="scan-item-${i}">
            <input class="name-in" id="sname-${i}" value="${item.name}" placeholder="Item name"/>
            <input class="amt-in" id="samt-${i}" type="number" value="${item.amount.toFixed(2)}" inputmode="decimal"/>
            <select id="scat-${i}">
              <option value="groceries" ${item.category==='groceries'?'selected':''}>Groceries</option>
              <option value="food" ${item.category==='food'?'selected':''}>Eating out</option>
              <option value="shared" ${item.category==='shared'?'selected':''}>Shared</option>
              <option value="jacob" ${item.category==='jacob'?'selected':''}>Jacob</option>
              <option value="b" ${item.category==='b'?'selected':''}>B</option>
            </select>
            <button class="scan-item-del" onclick="removeScanItem(${i})">✕</button>
          </div>`).join('')}
        <div style="margin-top:10px;display:flex;gap:8px;">
          <select id="scan-paid" style="flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;-webkit-appearance:none;">
            <option value="jacob">Jacob paid</option>
            <option value="b">B paid</option>
          </select>
          <button class="add-btn" style="flex:1;margin:0;" onclick="addScanItems(${items.length})">Add All</button>
        </div>
      </div>`;

    event.target.value = '';
  } catch(e) {
    toast('Error connecting to AI — check your API key', true);
    out.innerHTML = '';
  }
}

function removeScanItem(i) {
  const el = document.getElementById('scan-item-'+i);
  if(el) el.remove();
}

async function addScanItems(count) {
  const paid = document.getElementById('scan-paid').value;
  let added = 0;
  const promises = [];
  for(let i=0; i<count; i++) {
    const nameEl = document.getElementById('sname-'+i);
    const amtEl = document.getElementById('samt-'+i);
    const catEl = document.getElementById('scat-'+i);
    if(!nameEl) continue; // removed by user
    const name = nameEl.value.trim();
    const amount = parseFloat(amtEl.value);
    const type = catEl.value;
    if(!name || isNaN(amount) || amount<=0) continue;
    const expense_date = new Date().toISOString().split('T')[0];
    promises.push(sbClient.from('expenses').insert({name, amount, paid, type, expense_date}));
    added++;
  }
  await Promise.all(promises);
  if(added>0) {
    toast(added + ' expense' + (added>1?'s':'')+' added ✓');
    document.getElementById('scan-output').innerHTML = '';
  } else {
    toast('No valid items to add', true);
  }
}

function prevMonth() {
  const [y,m] = viewMonth.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  viewMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  render();
}
function nextMonth() {
  const [y,m] = viewMonth.split('-').map(Number);
  const d = new Date(y, m, 1);
  const now = new Date();
  const nowStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  viewMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  if(viewMonth > nowStr) viewMonth = nowStr;
  render();
}

function summaryCard(label, fixedBills, homeShare, income, personalSpend, soloFood, sharedGroceries, sharedEatingOut) {
  const totalFixedOut = fixedBills + homeShare;
  const totalSpent = (personalSpend||0) + (soloFood||0) + (sharedGroceries||0) + (sharedEatingOut||0);
  const totalUsed = totalFixedOut + totalSpent;
  const leftToSpend = income - totalUsed;
  const spentPct = income > 0 ? Math.min(100, Math.round((totalUsed / income) * 100)) : 0;
  const barColor = spentPct >= 100 ? 'var(--red)' : spentPct >= 80 ? '#f59e0b' : 'var(--green)';
  function statBox(lbl, val) {
    return `<div style="background:rgba(255,255,255,0.4);border-radius:10px;padding:9px 6px;text-align:center;">
      <div style="font-size:9px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.3px;line-height:1.3;">${lbl}</div>
      <div style="font-size:13px;font-weight:600;color:var(--text);">${fmt(val)}</div>
    </div>`;
  }
  return `
    <div style="background:linear-gradient(145deg,#ede9f8,#e0d8f5);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:1px solid var(--border2);">
      <div style="font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;">${label}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px;">Monthly income</div>
          <div style="font-family:var(--font-display);font-size:26px;color:var(--green);letter-spacing:-0.5px;">${fmt(income)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px;">Used so far</div>
          <div style="font-size:20px;font-weight:600;color:var(--red);">${fmt(totalUsed)}</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.4);border-radius:999px;height:10px;margin-bottom:10px;overflow:hidden;">
        <div style="height:100%;border-radius:999px;background:${barColor};width:${spentPct}%;transition:width 0.4s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:14px;">
        <span>Bills: ${fmt(totalFixedOut)}</span>
        <span>Spending: ${fmt(totalSpent)}</span>
        <span>${spentPct}% used</span>
      </div>
      <div style="background:rgba(255,255,255,0.6);border-radius:var(--radius-sm);padding:14px;text-align:center;margin-bottom:12px;">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Left to spend</div>
        <div style="font-family:var(--font-display);font-size:36px;letter-spacing:-1px;color:${leftToSpend>=0?'var(--green)':'var(--red)'};">${leftToSpend<0?'-':''}${fmt(leftToSpend)}</div>
        ${income===0?'<div style="font-size:11px;color:var(--muted);margin-top:4px;">Add income in the Income tab</div>':''}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">
        ${statBox('Personal Bills', fixedBills)}
        ${statBox('Home Share', homeShare)}
        ${statBox('Personal Spend', personalSpend||0)}
        ${statBox('Solo Eating Out', soloFood||0)}
        ${statBox('Shared Groceries', sharedGroceries||0)}
        ${statBox('Shared Eating Out', sharedEatingOut||0)}
      </div>
    </div>`;
}

  const bSharedHome = homeFixed.reduce((s,b)=>s+b.amount*0.4,0);

  const bSharedGroceries = thisMonthExp.filter(e=>e.type==='groceries').reduce((s,e)=>s+e.amount*0.4,0);
  const bSoloFood = thisMonthExp.filter(e=>e.type==='b_food').reduce((s,e)=>s+e.amount,0);
  const bOtherPersonal = thisMonthExp.filter(e=>e.type==='b').reduce((s,e)=>s+e.amount,0);

  function bCatRow(emoji, label, amount, sub) {
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border);">
      <div><div style="font-size:13px;font-weight:500;color:var(--text);">${emoji} ${label}</div>${sub?`<div style="font-size:11px;color:var(--muted);margin-top:1px;">${sub}</div>`:''}</div>
      <div style="font-size:14px;font-weight:600;color:var(--red);">${fmt(amount)}</div>
    </div>`;
  }

  return `
    ${summaryCard("B's summary", bPersonal, homeShare, bIncome, bOtherPersonal, bSoloFood, bSharedGroceries, bSharedFood)}

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;">
      <div style="font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px;">Shared costs · your 40%</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">${monthName}</div>
      ${bCatRow('🏠','Home bills', bSharedHome, 'Mortgage, utilities, etc.')}
      ${bCatRow('🛒','Groceries', bSharedGroceries, 'This month so far')}
      ${bCatRow('🍽️','Eating out (shared)', bSharedFood, 'This month so far')}
      <div style="display:flex;justify-content:space-between;padding-top:10px;">
        <div style="font-size:12px;font-weight:600;color:var(--text);">Total shared</div>
        <div style="font-size:14px;font-weight:700;color:var(--accent2);">${fmt(bSharedHome+bSharedFood+bSharedGroceries)}</div>
      </div>
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;">
      <div style="font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px;">Personal costs</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">${monthName}</div>
      ${bCatRow('📋','Fixed personal bills', bPersonal, 'Car, loans, phone, etc.')}
      ${bCatRow('🍔','Solo eating out', bSoloFood, 'This month so far')}
      ${bCatRow('🛍️','Other personal', bOtherPersonal, 'This month so far')}
      <div style="display:flex;justify-content:space-between;padding-top:10px;">
        <div style="font-size:12px;font-weight:600;color:var(--text);">Total personal</div>
        <div style="font-size:14px;font-weight:700;color:var(--accent2);">${fmt(bPersonal+bSoloFood+bOtherPersonal)}</div>
      </div>
    </div>

    <hr class="section-divider">
    <div class="section-label">B's personal fixed bills · ${fmt(bPersonal)}/mo</div>
    <div class="add-form" style="margin-bottom:10px;">
      <div class="form-title">Add a personal bill</div>
      <div class="form-field2"><label>Bill name</label><input id="bfix-name" placeholder="e.g. Car, Student loan…"/></div>
      <div class="form-field2"><label>Monthly $</label><input type="number" id="bfix-amt" placeholder="0.00" inputmode="decimal"/></div>
      <div class="form-field2"><label>Duration</label>
        <select id="bfix-months">
          <option value="0">Permanent</option>
          <option value="1">1 month</option>
          <option value="2">2 months</option>
          <option value="3">3 months</option>
          <option value="4">4 months</option>
          <option value="5">5 months</option>
          <option value="6">6 months</option>
          <option value="12">12 months</option>
          <option value="18">18 months</option>
          <option value="24">24 months</option>
        </select>
      </div>
      <button class="add-btn" onclick="addBFixed()">Add Bill</button>
    </div>
    <div class="item-list">
      ${bFixed.length?bFixed.map(b=>editRow(b,'b','saveBFixedEdit')).join(''):'<div class="empty-state"><div class="emoji">📋</div>No personal bills added yet</div>'}
    </div>
    <hr class="section-divider">
    <div class="section-label">Home bills — 40% share · ${fmt(homeShare)}/mo</div>
    <div class="item-list">${homeFixed.map(b=>editRow(b,'shared','saveFixedEdit')).join('')}</div>
    <hr class="section-divider">
    <div class="section-label">Income</div>
    <div class="item-list">
      ${data.incomes.filter(i=>i.who==='b').map(i=>
        editingIncId===i.id ? `
        <div class="item" style="flex-wrap:wrap;gap:8px;">
          <div class="item-dot b"></div>
          <div class="item-left"><input id="iedit-src-${i.id}" value="${i.source}" style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;"/></div>
          <input id="iedit-amt-${i.id}" type="number" value="${i.amount}" inputmode="decimal" style="width:90px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;"/>
          <button onclick="saveIncEdit('${i.id}')" style="background:var(--accent);border:none;border-radius:8px;padding:6px 14px;color:white;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;">Save</button>
          <button onclick="cancelIncEdit()" style="background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--muted);font-family:var(--font-body);font-size:12px;cursor:pointer;">Cancel</button>
        </div>` : `
        <div class="item">
          <div class="item-dot b"></div>
          <div class="item-left"><div class="item-name">${i.source}</div><div class="item-meta">B · monthly</div></div>
          <div class="item-amount income">${fmt(i.amount)}</div>
          <button class="item-del" onclick="startIncEdit('${i.id}')" style="font-size:14px;">✎</button>
          <button class="item-del" onclick="delInc('${i.id}')">✕</button>
        </div>`
      ).join('') || '<div class="empty-state"><div class="emoji">💰</div>Add income in the Income tab</div>'}
    </div>`;
}

function renderBudget() {
  const homeFixed = getFixed();
  const jacobFixed = getJacobFixed();
  const bFixed = getBFixed();
  const budgets = getBudget();
  const homeTotal = homeFixed.reduce((s,b)=>s+b.amount,0);
  const jacobPersonal = jacobFixed.reduce((s,b)=>s+b.amount,0);
  const bPersonal = bFixed.reduce((s,b)=>s+b.amount,0);
  const jacobIncome = data.incomes.filter(i=>i.who==='jacob').reduce((s,i)=>s+(+i.amount),0);
  const bIncome = data.incomes.filter(i=>i.who==='b').reduce((s,i)=>s+(+i.amount),0);
  const totalIncome = jacobIncome + bIncome;
  const jacobFixedTotal = jacobPersonal + homeTotal*0.6;
  const bFixedTotal = bPersonal + homeTotal*0.4;
  const jacobAvail = jacobIncome - jacobFixedTotal;
  const bAvail = bIncome - bFixedTotal;
  const combinedAvail = totalIncome - jacobFixedTotal - bFixedTotal;

  // This month's spending per category
  const now = new Date();
  const thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const monthName = ['January','February','March','April','May','June','July','August','September','October','November','December'][now.getMonth()];
  const thisMonthExp = data.expenses.filter(e => ((e.expense_date||e.created_at||'').slice(0,7)) === thisMonth);

  function spentForCat(cat) {
    return thisMonthExp.filter(e=>e.type===cat).reduce((s,e)=>s+e.amount,0);
  }

  function progressBar(spent, limit) {
    const pct = Math.min(100, limit>0 ? (spent/limit*100) : 0);
    const cls = pct >= 100 ? 'prog-red' : pct >= 75 ? 'prog-amber' : 'prog-green';
    return `<div class="progress-bar-wrap"><div class="progress-bar ${cls}" style="width:${pct}%"></div></div>`;
  }

  const budgetRows = budgets.map(bg => {
    const spent = spentForCat(bg.category);
    const left = bg.limit - spent;
    const pct = bg.limit>0 ? Math.min(100, Math.round(spent/bg.limit*100)) : 0;
    return `<div class="budget-cat">
      <div class="budget-cat-header">
        <div class="budget-cat-name">${bg.name}</div>
        <div class="budget-cat-amounts"><span>${fmt(spent)}</span> of ${fmt(bg.limit)} · ${left>=0?'<span style="color:var(--green)">'+fmt(left)+' left</span>':'<span style="color:var(--red)">'+fmt(Math.abs(left))+' over</span>'}</div>
      </div>
      ${progressBar(spent, bg.limit)}
      <div style="font-size:11px;color:var(--muted);">${pct}% used</div>
      <div class="budget-edit-row">
        <input type="number" id="blimit-${bg.id}" value="${bg.limit}" inputmode="decimal" placeholder="Monthly limit $"/>
        <button class="budget-edit-btn" onclick="saveBudgetLimit('${bg.id}')" style="background:var(--accent);color:white;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;">Save</button>
      </div>
    </div>`;
  }).join('');

  // Debts
  const debts = getDebts();
  const totalDebt = debts.reduce((s,d)=>s+(+d.balance),0);
  const totalMinPayment = debts.reduce((s,d)=>s+(+d.minPayment),0);

  function debtRow(d) {
    const paidPct = d.original>0 ? Math.min(100, Math.round((1 - d.balance/d.original)*100)) : 0;
    return `<div class="debt-card">
      <div class="debt-header">
        <div class="debt-name">${d.name}</div>
        <div class="debt-balance">${fmt(d.balance)}</div>
      </div>
      <div class="debt-meta">Min payment: ${fmt(d.minPayment)}/mo · ${paidPct}% paid off</div>
      <div class="debt-progress">${progressBar(d.original - d.balance, d.original)}</div>
      <div class="debt-actions">
        <input type="number" id="dpay-${d.id}" placeholder="Payment amount $" inputmode="decimal"/>
        <button onclick="makeDebtPayment('${d.id}')">Log Payment</button>
        <button class="ghost" onclick="deleteDebt('${d.id}')">✕</button>
      </div>
    </div>`;
  }

  return `
    <div class="budget-header">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">${monthName} budget</div>
      <div style="font-family:var(--font-display);font-size:30px;letter-spacing:-0.5px;color:var(--accent2);">${fmt(combinedAvail)}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">combined available after all fixed bills</div>
    </div>
    <div class="budget-available">
      <div class="budget-avail-card">
        <div class="budget-avail-label">Jacob available</div>
        <div class="budget-avail-val" style="color:${jacobAvail>=0?'var(--green)':'var(--red)'};">${fmt(jacobAvail)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px;">${fmt(jacobIncome)} income − ${fmt(jacobFixedTotal)} bills</div>
      </div>
      <div class="budget-avail-card">
        <div class="budget-avail-label">B available</div>
        <div class="budget-avail-val" style="color:${bAvail>=0?'var(--green)':'var(--red)'};">${fmt(bAvail)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px;">${fmt(bIncome)} income − ${fmt(bFixedTotal)} bills</div>
      </div>
    </div>
    <div class="section-label">Spending categories · ${monthName} — tap to update limits</div>
    ${budgetRows}

    <hr class="section-divider">
    <div class="section-label">💳 Debt tracker · ${fmt(totalDebt)} total · ${fmt(totalMinPayment)}/mo minimum</div>
    <div class="add-form" style="margin-bottom:10px;">
      <div class="form-title">Add a debt</div>
      <div class="form-field2"><label>Debt name</label><input id="debt-name" placeholder="e.g. Student loan, Car loan…"/></div>
      <div class="form-row2">
        <div class="form-field2"><label>Current balance</label><input type="number" id="debt-balance" placeholder="$0.00" inputmode="decimal"/></div>
        <div class="form-field2"><label>Min payment/mo</label><input type="number" id="debt-min" placeholder="$0.00" inputmode="decimal"/></div>
      </div>
      <button class="add-btn" onclick="addDebt()">Add Debt</button>
    </div>
    <div>
      ${debts.length ? debts.map(d=>debtRow(d)).join('') : '<div class="empty-state"><div class="emoji">💳</div>No debts added yet</div>'}
    </div>
  `;
}

function addDebt() {
  const name = document.getElementById('debt-name').value.trim();
  const balance = parseFloat(document.getElementById('debt-balance').value);
  const minPayment = parseFloat(document.getElementById('debt-min').value);
  if(!name||isNaN(balance)||balance<=0){toast('Fill in all fields!',true);return;}
  const debts = getDebts();
  debts.push({id:'d'+Date.now(), name, balance, original:balance, minPayment: isNaN(minPayment)?0:minPayment});
  saveDebts(debts);
  toast('Debt added ✓');
  render();
}

function makeDebtPayment(id) {
  const el = document.getElementById('dpay-'+id);
  const amount = parseFloat(el.value);
  if(isNaN(amount)||amount<=0){toast('Enter a payment amount',true);return;}
  const debts = getDebts();
  const idx = debts.findIndex(d=>d.id===id);
  if(idx>-1) {
    debts[idx].balance = Math.max(0, debts[idx].balance - amount);
    saveDebts(debts);
    toast('Payment logged ✓');
    render();
  }
}

function deleteDebt(id) {
  saveDebts(getDebts().filter(d=>d.id!==id));
  render();
}

function saveBudgetLimit(id) {
  const el = document.getElementById('blimit-'+id);
  const limit = parseFloat(el.value);
  if(isNaN(limit)||limit<0){toast('Enter a valid amount',true);return;}
  const arr = getBudget();
  const idx = arr.findIndex(b=>b.id===id);
  if(idx>-1) arr[idx].limit = limit;
  saveBudget(arr);
  toast('Budget updated ✓');
  render();
}

// ── Actions ──
function startIncEdit(id) { editingIncId=id; render(); }
function cancelIncEdit() { editingIncId=null; render(); }
async function saveIncEdit(id) {
  const source = document.getElementById('iedit-src-'+id).value.trim();
  const amount = parseFloat(document.getElementById('iedit-amt-'+id).value);
  if(!source||isNaN(amount)||amount<=0){toast('Fill in both fields!',true);return;}
  const {error} = await sbClient.from('incomes').update({source,amount}).eq('id',id);
  if(error){toast('Error saving',true);}else{editingIncId=null;toast('Income updated ✓');}
}
async function addPayment() {
  const from_who = document.getElementById('pay-from').value;
  const to_who = document.getElementById('pay-to').value;
  const amount = parseFloat(document.getElementById('pay-amt').value);
  const method = document.getElementById('pay-method').value;
  const paid_at = document.getElementById('pay-date').value || new Date().toISOString().split('T')[0];
  const note = document.getElementById('pay-note').value.trim();
  if(from_who===to_who){toast('From and To cannot be the same!',true);return;}
  if(isNaN(amount)||amount<=0){toast('Enter a valid amount!',true);return;}
  const {error}=await sbClient.from('payments').insert({from_who,to_who,amount,method,note,paid_at});
  if(error){toast('Error saving',true);}else{toast('Payment logged ✓');}
}
async function delPayment(id) {
  await sbClient.from('payments').delete().eq('id',id);
}
async function addBill() {
  const name=document.getElementById('bill-name').value.trim();
  const amount=parseFloat(document.getElementById('bill-amt').value);
  const type=document.getElementById('bill-type').value;
  if(!name||isNaN(amount)||amount<=0){toast('Fill in all fields!',true);return;}
  const {error}=await sbClient.from('bills').insert({name,amount,type});
  if(error){toast('Error saving',true);}else{toast('Bill added ✓');}
}
async function delBill(id) {
  await sbClient.from('bills').delete().eq('id',id);
}

async function addExpense() {
  const name=document.getElementById('exp-name').value.trim();
  const amount=parseFloat(document.getElementById('exp-amt').value);
  const paid=document.getElementById('exp-paid').value;
  const type=document.getElementById('exp-type').value;
  const expense_date=document.getElementById('exp-date').value || new Date().toISOString().split('T')[0];
  if(!name||isNaN(amount)||amount<=0){toast('Fill in all fields!',true);return;}
  const {error}=await sbClient.from('expenses').insert({name,amount,paid,type,expense_date});
  if(error){toast('Error saving',true);}else{toast('Expense added ✓');}
}
async function delExp(id) {
  await sbClient.from('expenses').delete().eq('id',id);
}

function addJacobFixed() {
  const name = document.getElementById('jfix-name').value.trim();
  const amount = parseFloat(document.getElementById('jfix-amt').value);
  const months = parseInt(document.getElementById('jfix-months').value);
  if(!name||isNaN(amount)||amount<=0){toast('Fill in all fields!',true);return;}
  const arr = getJacobFixed();
  const bill = {id:'j'+Date.now(), name, amount};
  if(months > 0) {
    const expiry = new Date();
    expiry.setMonth(expiry.getMonth() + months);
    bill.expiresAt = expiry.toISOString().slice(0,7);
    bill.expiryLabel = months + ' month' + (months>1?'s':'');
  }
  arr.push(bill);
  saveJacobFixed(arr);
  toast('Bill added ✓');
  render();
}

function addBFixed() {
  const name = document.getElementById('bfix-name').value.trim();
  const amount = parseFloat(document.getElementById('bfix-amt').value);
  const months = parseInt(document.getElementById('bfix-months').value);
  if(!name||isNaN(amount)||amount<=0){toast('Fill in all fields!',true);return;}
  const arr = getBFixed();
  const bill = {id:'b'+Date.now(), name, amount};
  if(months > 0) {
    const expiry = new Date();
    expiry.setMonth(expiry.getMonth() + months);
    bill.expiresAt = expiry.toISOString().slice(0,7);
    bill.expiryLabel = months + ' month' + (months>1?'s':'');
  }
  arr.push(bill);
  saveBFixed(arr);
  toast('Bill added ✓');
  render();
}
function saveBFixedEdit(id) {
  const name=document.getElementById('fedit-name-'+id).value.trim();
  const amount=parseFloat(document.getElementById('fedit-amt-'+id).value);
  if(!name||isNaN(amount)||amount<=0){toast('Fill in both fields!',true);return;}
  const arr=getBFixed();
  const idx=arr.findIndex(b=>b.id===id);
  if(idx>-1){arr[idx].name=name;arr[idx].amount=amount;}
  saveBFixed(arr);
  editingFixedId=null;
  toast('Bill updated ✓');
  render();
}
function delBFixed(id) {
  saveBFixed(getBFixed().filter(b=>b.id!==id));
  render();
}
async function addIncome() {
  const source=document.getElementById('inc-src').value.trim();
  const amount=parseFloat(document.getElementById('inc-amt').value);
  const who=document.getElementById('inc-who').value;
  if(!source||isNaN(amount)||amount<=0){toast('Fill in all fields!',true);return;}
  const {error}=await sbClient.from('incomes').insert({source,amount,who});
  if(error){toast('Error saving',true);}else{toast('Income added ✓');}
}
async function delInc(id) {
  await sbClient.from('incomes').delete().eq('id',id);
}

// ── Boot ──
(async () => {
  const saved = localStorage.getItem(CONFIG_KEY);
  if(saved) {
    document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Connecting…</div>';
    try {
      const {url,key} = JSON.parse(saved);
      await initSupabase(url,key);
    } catch(e) {
      showSetup();
    }
  } else {
    showSetup();
  }
})();

// service worker disabled
</script>
</body>
</html>
