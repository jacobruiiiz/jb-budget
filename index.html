<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ede9f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="J&B Budget">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>J&B Budget v4</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f3f0fb;--sur:#fff;--sur2:#ede9f8;--brd:rgba(139,111,211,.15);--brd2:rgba(139,111,211,.28);--txt:#2d1f5e;--mut:#9585c0;--acc:#7c5cbf;--acc2:#6941c6;--grn:#0d9e6e;--red:#dc3545;--amb:#d97706;--jac:#6941c6;--bcl:#c026a0;--sh:#0d9e6e;--rad:16px;--rsm:10px;--ff:'DM Sans',sans-serif;--fd:'DM Serif Display',serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--ff);overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.hdr{padding:52px 20px 14px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.ttl{font-family:var(--fd);font-size:26px;letter-spacing:-.5px}
.ttl em{color:var(--acc2)}
.mpill{font-size:12px;color:var(--mut);background:var(--sur);border:1px solid var(--brd);border-radius:20px;padding:3px 11px}
.stlbl{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:5px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--mut);transition:background .3s;flex-shrink:0}
.sdot.live{background:var(--grn)}.sdot.err{background:var(--red)}
.con{flex:1;overflow-y:auto;padding:0 20px 100px;-webkit-overflow-scrolling:touch}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sur);border-top:1px solid var(--brd2);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(105,65,198,.07)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 2px;color:var(--mut);font-family:var(--ff);transition:color .2s}
.nb.active{color:var(--acc2)}
.nb svg{width:20px;height:20px}
.nb span{font-size:9px;font-weight:500;letter-spacing:.3px}
.gc{background:linear-gradient(145deg,#ede9f8,#e0d8f5);border-radius:var(--rad);padding:18px 20px;margin-bottom:14px;border:1px solid var(--brd2)}
.sc{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rad);padding:14px 16px;margin-bottom:12px}
.mg3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sbox{background:rgba(255,255,255,.45);border-radius:10px;padding:9px 6px;text-align:center}
.sbox-l{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.3px;line-height:1.3;margin-bottom:2px}
.sbox-v{font-size:13px;font-weight:600;color:var(--txt)}
.lbox{background:rgba(255,255,255,.6);border-radius:var(--rsm);padding:14px;text-align:center;margin-bottom:10px}
.lbox-l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.lbox-v{font-family:var(--fd);font-size:36px;letter-spacing:-1px}
.pw{background:rgba(255,255,255,.4);border-radius:999px;height:10px;margin:8px 0;overflow:hidden}
.pb{height:100%;border-radius:999px;transition:width .4s}
.pg{background:var(--grn)}.pa{background:var(--amb)}.pr{background:var(--red)}
.sl{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
.il{display:flex;flex-direction:column;gap:7px}
.it{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rsm);padding:10px 13px;display:flex;align-items:center;gap:9px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.j{background:var(--jac)}.dot.b{background:var(--bcl)}.dot.s{background:var(--sh)}
.il-l{flex:1;min-width:0}
.in{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.im{font-size:11px;color:var(--mut);margin-top:2px}
.ia{font-size:14px;font-weight:600;color:var(--red);flex-shrink:0}
.ia.inc{color:var(--grn)}
.id{background:none;border:none;cursor:pointer;color:var(--mut);padding:3px 5px;border-radius:6px;font-size:14px;flex-shrink:0}
.es{text-align:center;padding:24px 16px;color:var(--mut);font-size:13px}
.es .em{font-size:26px;margin-bottom:6px}
.dv{border:none;border-top:1px solid var(--brd);margin:14px 0}
.af{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.ft{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:10px}
.f{margin-bottom:9px}
.f label{font-size:11px;color:var(--mut);font-weight:500;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.f input,.f select{width:100%;background:var(--bg);border:1px solid var(--brd2);border-radius:var(--rsm);padding:9px 11px;color:var(--txt);font-family:var(--ff);font-size:13px;outline:none;-webkit-appearance:none}
.f input:focus,.f select:focus{border-color:var(--acc)}
.f input::placeholder{color:var(--mut)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ab{width:100%;background:var(--acc);border:none;border-radius:var(--rsm);padding:11px;color:#fff;font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;margin-top:3px}
.ab:active{opacity:.8}
.note{background:rgba(105,65,198,.07);border:1px solid rgba(105,65,198,.2);border-radius:var(--rsm);padding:9px 13px;font-size:12px;color:var(--acc2);margin-bottom:12px;line-height:1.5}
.su{padding:20px 0}
.suc{background:var(--sur);border:1px solid var(--brd2);border-radius:var(--rad);padding:22px;margin-bottom:14px}
.suc h2{font-size:16px;font-weight:600;margin-bottom:6px}
.suc p{font-size:13px;color:var(--mut);margin-bottom:14px;line-height:1.5}
.suc a{color:var(--acc2)}
.sbg{background:var(--acc);color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:2px 10px;display:inline-block;margin-bottom:8px}
.suc pre{background:var(--bg);border-radius:10px;padding:12px;font-size:11px;color:var(--acc2);overflow-x:auto;margin:10px 0;line-height:1.6;white-space:pre-wrap}
.sbtn{width:100%;background:var(--acc);border:none;border-radius:var(--rsm);padding:12px;color:#fff;font-family:var(--ff);font-size:14px;font-weight:600;cursor:pointer}
.ld{display:flex;align-items:center;justify-content:center;height:120px;color:var(--mut);font-size:13px;gap:10px}
.sp{width:18px;height:18px;border:2px solid var(--brd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--grn);color:#0f1f17;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}.toast.err{background:var(--red);color:#fff}
.scbtn{width:100%;background:var(--sur);border:1.5px dashed var(--brd2);border-radius:var(--rad);padding:14px;color:var(--acc2);font-family:var(--ff);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.sprev{width:100%;border-radius:var(--rsm);margin-bottom:10px;max-height:180px;object-fit:cover}
.sres{background:var(--sur);border:1px solid var(--brd2);border-radius:var(--rad);padding:12px;margin-bottom:10px}
.sit{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:.5px solid var(--brd)}
.sit:last-child{border-bottom:none}
.sit input,.sit select{background:var(--bg);border:1px solid var(--brd2);border-radius:8px;padding:5px 8px;color:var(--txt);font-family:var(--ff);font-size:12px;outline:none;-webkit-appearance:none}
.sit .snm{flex:1}.sit .sam{width:75px}
.sdel{background:none;border:none;cursor:pointer;color:var(--mut);font-size:14px;padding:2px 5px}
.cr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--brd)}
.cr:last-child{border-bottom:none}
.crn{font-size:13px;font-weight:500;color:var(--txt)}
.crs{font-size:11px;color:var(--mut);margin-top:1px}
.cra{font-size:14px;font-weight:600;color:var(--red)}
.ctot{display:flex;justify-content:space-between;padding-top:10px;margin-top:2px}
.ctotl{font-size:12px;font-weight:600;color:var(--txt)}
.ctotv{font-size:14px;font-weight:700;color:var(--acc2)}
.ec{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rsm);margin-bottom:8px;overflow:hidden}
.ech{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer}
.ecn{font-size:13px;font-weight:600;color:var(--txt)}
.ecspl{font-size:11px;color:var(--mut);margin-top:2px}
.ecr{display:flex;align-items:center;gap:8px}
.ect{font-size:15px;font-weight:600;color:var(--red)}
.eca{color:var(--mut);font-size:11px}
.ei{padding:8px 13px;border-top:.5px solid var(--brd);display:flex;align-items:center;gap:8px}
.eil{flex:1;min-width:0}
.ein{font-size:13px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eim{font-size:11px;color:var(--mut)}
.stag{font-size:10px;background:var(--sur2);border-radius:999px;padding:1px 7px;color:var(--mut);margin-left:4px}
.eia{font-size:14px;font-weight:600;color:var(--red);white-space:nowrap}
.eib{background:none;border:none;cursor:pointer;color:var(--mut);font-size:13px;padding:2px 4px}
.ef{padding:10px 13px;background:var(--sur2);border-top:.5px solid var(--brd)}
.ef input,.ef select{width:100%;background:var(--bg);border:1px solid var(--brd2);border-radius:8px;padding:7px 9px;color:var(--txt);font-family:var(--ff);font-size:12px;outline:none;-webkit-appearance:none;margin-bottom:7px}
.efr{display:flex;gap:6px;margin-top:2px}
.es2{flex:1;background:var(--acc);border:none;border-radius:8px;padding:7px;color:#fff;font-family:var(--ff);font-size:12px;font-weight:600;cursor:pointer}
.ec2{background:none;border:1px solid var(--brd2);border-radius:8px;padding:7px 12px;color:var(--mut);font-family:var(--ff);font-size:12px;cursor:pointer}
.ed2{background:none;border:1px solid var(--red);border-radius:8px;padding:7px 12px;color:var(--red);font-family:var(--ff);font-size:12px;cursor:pointer}
.fe{background:var(--sur2);border-radius:var(--rsm);padding:10px;margin-bottom:6px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.fe input{background:var(--bg);border:1px solid var(--brd2);border-radius:8px;padding:6px 9px;color:var(--txt);font-family:var(--ff);font-size:12px;outline:none}
.fe .fnm{flex:1}.fe .fam{width:85px}
.fs2{background:var(--acc);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-family:var(--ff);font-size:12px;font-weight:600;cursor:pointer}
.fc2{background:none;border:1px solid var(--brd2);border-radius:8px;padding:6px 10px;color:var(--mut);font-family:var(--ff);font-size:12px;cursor:pointer}
.mn{display:flex;align-items:center;justify-content:space-between;margin:14px 0 10px}
.mnb{background:var(--sur);border:1px solid var(--brd2);border-radius:var(--rsm);padding:7px 13px;color:var(--txt);font-family:var(--ff);font-size:12px;cursor:pointer}
.mnb:disabled{opacity:.35;cursor:default}
.mnc{text-align:center}
.mnn{font-size:14px;font-weight:600;color:var(--txt)}
.mnt{font-size:11px;color:var(--mut)}
.ba{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bac{background:var(--sur);border:1px solid var(--brd2);border-radius:var(--rsm);padding:12px 13px}
.bc{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rsm);padding:12px 13px;margin-bottom:8px}
.bch{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.bcn{font-size:13px;font-weight:500;color:var(--txt)}
.bci{font-size:11px;color:var(--mut)}
.bp{background:var(--bg);border-radius:999px;height:7px;margin:6px 0 4px;overflow:hidden}
.bb{height:100%;border-radius:999px;transition:width .4s}
.be{display:flex;gap:6px;margin-top:8px}
.be input{flex:1;background:var(--bg);border:1px solid var(--brd2);border-radius:8px;padding:6px 10px;color:var(--txt);font-family:var(--ff);font-size:12px;outline:none}
.bs3{background:var(--acc);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-family:var(--ff);font-size:12px;font-weight:600;cursor:pointer}
.dc{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rsm);padding:13px;margin-bottom:8px}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.dn{font-size:14px;font-weight:500;color:var(--txt)}
.db{font-size:16px;font-weight:600;color:var(--red)}
.dm{font-size:11px;color:var(--mut);margin-bottom:7px}
.da{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.da input{flex:1;min-width:80px;background:var(--bg);border:1px solid var(--brd2);border-radius:8px;padding:6px 10px;color:var(--txt);font-family:var(--ff);font-size:12px;outline:none}
.dp3{background:var(--acc);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-family:var(--ff);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.dd3{background:none;border:1px solid var(--brd2);border-radius:8px;padding:6px 10px;color:var(--mut);font-family:var(--ff);font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="ttl">J<em>&amp;</em>B <span style="font-style:normal;color:var(--txt)">Budget</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="mpill" id="mpill"></div>
        <div class="stlbl"><span class="sdot" id="sdot"></span><span id="stxt">connecting...</span></div>
      </div>
    </div>
  </div>
  <div class="con" id="con"><div class="ld"><div class="sp"></div>Loading...</div></div>
  <nav class="nav" id="mainnav" style="display:none">
    <button class="nb active" id="nav-overview" onclick="go('overview')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Overview</span></button>
    <button class="nb" id="nav-bills" onclick="go('bills')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Bills</span></button>
    <button class="nb" id="nav-expenses" onclick="go('expenses')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Expenses</span></button>
    <button class="nb" id="nav-income" onclick="go('income')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg><span>Income</span></button>
    <button class="nb" id="nav-jacob" onclick="go('jacob')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Jacob</span></button>
    <button class="nb" id="nav-b" onclick="go('b')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>B</span></button>
    <button class="nb" id="nav-budget" onclick="go('budget')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span>Budget</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
var CFG='jb-cfg3',ANT='jb-ant',HMK='jb-home',JFK='jb-jfix',BFK='jb-bfix',BUDK='jb-bud',DBTK='jb-dbt';
var HOME0=[{id:'h1',name:'Mortgage',amount:2184},{id:'h2',name:'Mortgage insurance',amount:191},{id:'h3',name:'Electricity',amount:180},{id:'h4',name:'Pest control',amount:44.29},{id:'h5',name:'Trash',amount:38},{id:'h6',name:'Internet',amount:71.40}];
var JFIX0=[{id:'j1',name:'Car',amount:867},{id:'j2',name:'Student loan',amount:75},{id:'j3',name:'Apple',amount:134.28},{id:'j4',name:'Car insurance',amount:200},{id:'j5',name:'Phone bill',amount:161},{id:'j6',name:'Property tax',amount:291}];
var BUD0=[{id:'b1',name:'Groceries',cat:'groceries',lim:600},{id:'b2',name:'Eating out',cat:'food',lim:300},{id:'b3',name:'Other shared',cat:'shared',lim:200},{id:'b4',name:'Jacob personal',cat:'jacob',lim:200},{id:'b5',name:'B personal',cat:'b',lim:200}];
var JSUBS=['Hobbies','Clothes','Shoes','Vitamins','Medical','Personal Care','Entertainment','Gifts','Travel/Gas','Dog Food','Dog Groom','Education'];
var BSUBS=['Hobbies','Clothes','Shoes','Makeup','Vitamins','Medical','Personal Care','Entertainment','Gifts','Travel/Gas','Dog Food','Dog Groom','Education'];
var SSUBS=['Entertainment','Travel','Gifts','Home Supplies'];
var SB=null,PAGE='overview',VM='',XCAT=null,XFIX=null,XINC=null,XEXP=null;
var DB={bills:[],expenses:[],incomes:[],payments:[]};

function gh(){try{return JSON.parse(localStorage.getItem(HMK))||HOME0}catch(e){return HOME0}}
function gj(){try{var n=nm();return(JSON.parse(localStorage.getItem(JFK))||JFIX0).filter(function(b){return !b.ex||b.ex>=n})}catch(e){return JFIX0}}
function gbf(){try{var n=nm();return(JSON.parse(localStorage.getItem(BFK))||[]).filter(function(b){return !b.ex||b.ex>=n})}catch(e){return[]}}
function gbud(){try{return JSON.parse(localStorage.getItem(BUDK))||BUD0}catch(e){return BUD0}}
function gdbt(){try{return JSON.parse(localStorage.getItem(DBTK))||[]}catch(e){return[]}}
function svh(a){localStorage.setItem(HMK,JSON.stringify(a))}
function svj(a){localStorage.setItem(JFK,JSON.stringify(a))}
function svbf(a){localStorage.setItem(BFK,JSON.stringify(a))}
function svbud(a){localStorage.setItem(BUDK,JSON.stringify(a))}
function svdbt(a){localStorage.setItem(DBTK,JSON.stringify(a))}

function fmt(n){return '$'+Math.abs(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function nm(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function ml(ym){var p=ym.split('-');return MN[+p[1]-1]+' '+p[0]}
function td(){return new Date().toISOString().slice(0,10)}
function xd(e){return e.expense_date||(e.created_at||'').slice(0,10)||''}
function xm(e){return xd(e).slice(0,7)}
function elbl(t){return{groceries:'Groceries (shared)',food:'Eating out (shared)',shared:'Other shared',jacob:'Jacob personal',jacob_food:'Jacob solo eating',b:'B personal',b_food:'B solo eating',transfer:'Transfer/Venmo/Zelle'}[t]||t}
function gsubs(t){return t==='jacob'?JSUBS:t==='b'?BSUBS:t==='shared'?SSUBS:[]}
function subOpts(t,cur){var ss=gsubs(t);if(!ss.length)return'';return'<option value="">-- none --</option>'+ss.map(function(s){return'<option value="'+s+'"'+(s===cur?' selected':'')+'>'+s+'</option>'}).join('')}
function barcls(p){return p>=100?'pr':p>=75?'pa':'pg'}

function toast(m,e){var t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' err':'');setTimeout(function(){t.className='toast'},2200)}
function setst(s){var d=document.getElementById('sdot'),t=document.getElementById('stxt');if(s==='live'){d.className='sdot live';t.textContent='live'}else if(s==='err'){d.className='sdot err';t.textContent='offline'}else{d.className='sdot';t.textContent='connecting...'}}

function calc(){
  var ji=DB.incomes.filter(function(i){return i.who==='jacob'}).reduce(function(s,i){return s+(+i.amount)},0);
  var bi=DB.incomes.filter(function(i){return i.who==='b'}).reduce(function(s,i){return s+(+i.amount)},0);
  var ht=gh().reduce(function(s,b){return s+b.amount},0);
  var n=nm();
  var me=DB.expenses.filter(function(e){return xm(e)===n});
  var mp=DB.payments.filter(function(p){return(p.paid_at||'').slice(0,7)===n});
  var bal=ht*0.4;
  DB.bills.filter(function(b){return b.type==='shared'}).forEach(function(b){bal+=b.amount*0.4});
  me.filter(function(e){return['groceries','food','shared'].indexOf(e.type)>-1}).forEach(function(e){
    bal+=e.paid==='jacob'?e.amount*0.4:-e.amount*0.6;
  });
  mp.forEach(function(p){
    if(p.from_who==='b'&&p.to_who==='jacob')bal-=+p.amount;
    if(p.from_who==='jacob'&&p.to_who==='b')bal+=+p.amount;
  });
  return{ji:ji,bi:bi,ht:ht,me:me,mp:mp,bal:bal};
}

function go(p){
  PAGE=p;
  ['overview','bills','expenses','income','jacob','b','budget'].forEach(function(x){
    document.getElementById('nav-'+x).classList.toggle('active',x===p);
  });
  document.getElementById('con').innerHTML='<div class="ld"><div class="sp"></div></div>';
  requestAnimationFrame(render);
}
function render(){
  var c=calc();
  var fns={overview:rOv,bills:rBills,expenses:rExp,income:rInc,jacob:rJacob,b:rB,budget:rBudget};
  document.getElementById('con').innerHTML=fns[PAGE](c);
  var pd=document.getElementById('pd');if(pd&&!pd.value)pd.value=td();
  var ed=document.getElementById('edp');if(ed&&!ed.value)ed.value=td();
}

// ---- SUMMARY CARD ----

// ---- JACOB ----
function rJacob(c){
  var hm=gh(),jf=gj(),hs=hm.reduce(function(s,b){return s+b.amount},0)*.6,fb=jf.reduce(function(s,b){return s+b.amount},0);
  var me=c.me,l=ml(nm());
  var shF=me.filter(function(e){return e.type==='food'}).reduce(function(s,e){return s+e.amount*.6},0);
  var shG=me.filter(function(e){return e.type==='groceries'}).reduce(function(s,e){return s+e.amount*.6},0);
  var soF=me.filter(function(e){return e.type==='jacob_food'}).reduce(function(s,e){return s+e.amount},0);
  var pS=me.filter(function(e){return e.type==='jacob'}).reduce(function(s,e){return s+e.amount},0);

async function saveCfg(){
  var url=document.getElementById('surl').value.trim(),key=document.getElementById('skey').value.trim();
  if(!url||!key){toast('Paste both fields!',true);return}
  localStorage.setItem(CFG,JSON.stringify({url:url,key:key}));
  await initSb(url,key);
}

async function initSb(url,key){
  try{
    SB=window.supabase.createClient(url,key);
    await loadAll();subRT();
    document.getElementById('mainnav').style.display='flex';setst('live');
    VM=nm();go('overview');
  }catch(e){setst('err');toast('Connection failed - check your keys',true);showSetup()}
}

async function loadAll(){
  var r=await Promise.all([
    SB.from('bills').select('*').order('created_at'),
    SB.from('expenses').select('*').order('created_at'),
    SB.from('incomes').select('*').order('created_at'),
    SB.from('payments').select('*').order('paid_at',{ascending:false})
  ]);
  if(r[0].error||r[1].error||r[2].error||r[3].error)throw new Error('load failed');
  DB.bills=r[0].data||[];DB.expenses=r[1].data||[];DB.incomes=r[2].data||[];DB.payments=r[3].data||[];
}

async function rel(t){var ord=t==='payments'?{column:'paid_at',ascending:false}:{column:'created_at',ascending:true};var res=await SB.from(t).select('*').order(ord.column,{ascending:ord.ascending});DB[t]=res.data||[]}

function subRT(){
  SB.channel('db')
    .on('postgres_changes',{event:'*',schema:'public',table:'bills'},async function(){await rel('bills');render()})
    .on('postgres_changes',{event:'*',schema:'public',table:'expenses'},async function(){await rel('expenses');render()})
    .on('postgres_changes',{event:'*',schema:'public',table:'incomes'},async function(){await rel('incomes');render()})
    .on('postgres_changes',{event:'*',schema:'public',table:'payments'},async function(){await rel('payments');render()})
    .subscribe(function(s){if(s==='SUBSCRIBED')setst('live');else if(s==='CHANNEL_ERROR')setst('err')});
}

function addJFix(){var n=document.getElementById('jfn').value.trim(),a=parseFloat(document.getElementById('jfa').value),m=parseInt(document.getElementById('jfm').value);if(!n||isNaN(a)||a<=0){toast('Fill in all fields!',true);return}var full=JSON.parse(localStorage.getItem(JFK)||'null')||JFIX0,b={id:'j'+Date.now(),name:n,amount:a};if(m>0){var d=new Date();d.setMonth(d.getMonth()+m);b.ex=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}full.push(b);svj(full);toast('Bill added');render()}
function sjEd(id){var n=document.getElementById('jn-'+id).value.trim(),a=parseFloat(document.getElementById('ja-'+id).value);if(!n||isNaN(a)||a<=0){toast('Fill in fields!',true);return}var full=JSON.parse(localStorage.getItem(JFK)||'null')||JFIX0,i=full.findIndex(function(b){return b.id===id});if(i>-1){full[i].name=n;full[i].amount=a;svj(full)}XFIX=null;toast('Updated');render()}
function djFix(id){var full=JSON.parse(localStorage.getItem(JFK)||'null')||JFIX0;svj(full.filter(function(b){return b.id!==id}));render()}

function addBFix(){var n=document.getElementById('bfn').value.trim(),a=parseFloat(document.getElementById('bfa').value),m=parseInt(document.getElementById('bfm').value);if(!n||isNaN(a)||a<=0){toast('Fill in all fields!',true);return}var full=JSON.parse(localStorage.getItem(BFK)||'null')||[],b={id:'b'+Date.now(),name:n,amount:a};if(m>0){var d=new Date();d.setMonth(d.getMonth()+m);b.ex=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}full.push(b);svbf(full);toast('Bill added');render()}
function sbEd(id){var n=document.getElementById('bn-'+id).value.trim(),a=parseFloat(document.getElementById('ba-'+id).value);if(!n||isNaN(a)||a<=0){toast('Fill in fields!',true);return}var full=JSON.parse(localStorage.getItem(BFK)||'null')||[],i=full.findIndex(function(b){return b.id===id});if(i>-1){full[i].name=n;full[i].amount=a;svbf(full)}XFIX=null;toast('Updated');render()}
function dbFix(id){var full=JSON.parse(localStorage.getItem(BFK)||'null')||[];svbf(full.filter(function(b){return b.id!==id}));render()}

function saveBLim(id){var e=document.getElementById('bl-'+id),l=parseFloat(e.value);if(isNaN(l)||l<0){toast('Enter a valid amount',true);return}var arr=gbud(),i=arr.findIndex(function(b){return b.id===id});if(i>-1){arr[i].lim=l;svbud(arr)}toast('Budget updated');render()}

function addDbt(){var n=document.getElementById('dbn').value.trim(),b=parseFloat(document.getElementById('dbb').value),m=parseFloat(document.getElementById('dbm').value)||0;if(!n||isNaN(b)||b<=0){toast('Fill in all fields!',true);return}var arr=gdbt();arr.push({id:'d'+Date.now(),name:n,balance:b,original:b,minPayment:m});svdbt(arr);toast('Debt added');render()}
function mkDPay(id){var e=document.getElementById('dp-'+id),a=parseFloat(e.value);if(isNaN(a)||a<=0){toast('Enter a payment amount',true);return}var arr=gdbt(),i=arr.findIndex(function(d){return d.id===id});if(i>-1){arr[i].balance=Math.max(0,arr[i].balance-a);svdbt(arr)}toast('Payment logged');render()}
function delDbt(id){svdbt(gdbt().filter(function(d){return d.id!==id}));render()}

// ---- SCANNER ----
function trigScan(){
  var k=localStorage.getItem(ANT);
  if(!k){k=prompt('Enter your Anthropic API key (sk-ant-...)\n\nGet one free at console.anthropic.com\nStored only on this device:');if(k&&k.startsWith('sk-ant')){localStorage.setItem(ANT,k);toast('API key saved')}else if(k){toast('Invalid key',true);return}else return}
  document.getElementById('scanin').click();
}
async function handleScan(e){
  var f=e.target.files[0];if(!f)return;
  var out=document.getElementById('scanout');
  out.innerHTML='<div class="ld"><div class="sp"></div>Analyzing...</div>';
  var b64=await new Promise(function(res){var rd=new FileReader();rd.onload=function(){res(rd.result.split(',')[1])};rd.readAsDataURL(f)});
  var iu=URL.createObjectURL(f),k=localStorage.getItem(ANT);
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-6',max_tokens:1024,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:f.type,data:b64}},{type:'text',text:'Extract each line item from this receipt or screenshot. Return ONLY a JSON array like: [{"name":"Item","amount":12.34,"category":"groceries"}]. Categories: groceries (grocery stores), food (shared restaurant meals), shared (general shared), jacob (Jacob personal), jacob_food (solo male dining), b (B personal), b_food (solo female dining), transfer (money transfers). No explanation, just the JSON array.'}]}]})});
    var data=await resp.json();
    if(data.error){toast('API error: '+data.error.message,true);out.innerHTML='';return}
    var items=[];
    try{var txt=data.content[0].text.trim().replace(/```json|```/g,'').trim();items=JSON.parse(txt)}catch(ex){toast('Could not read receipt',true);out.innerHTML='';return}
    if(!items.length){toast('No items found',true);out.innerHTML='';return}
    var rows=items.map(function(item,i){
      return'<div class="sit" id="si-'+i+'"><input class="snm" id="sn-'+i+'" value="'+item.name+'"><input class="sam" id="sa-'+i+'" type="number" value="'+item.amount.toFixed(2)+'"><select id="sc-'+i+'"><option value="groceries"'+(item.category==='groceries'?' selected':'')+'>Groceries</option><option value="food"'+(item.category==='food'?' selected':'')+'>Eating out</option><option value="shared"'+(item.category==='shared'?' selected':'')+'>Shared</option><option value="jacob"'+(item.category==='jacob'?' selected':'')+'>Jacob</option><option value="jacob_food"'+(item.category==='jacob_food'?' selected':'')+'>Jacob solo</option><option value="b"'+(item.category==='b'?' selected':'')+'>B</option><option value="b_food"'+(item.category==='b_food'?' selected':'')+'>B solo</option></select><button class="sdel" data-si="si-'+i+'" onclick="document.getElementById(this.dataset.si).remove()">&#10005;</button></div>';
    }).join('');
    out.innerHTML='<img src="'+iu+'" class="sprev"><div class="sres"><div style="font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Found '+items.length+' item'+(items.length>1?'s':'')+' - edit if needed</div>'+rows+'<div style="margin-top:10px;display:flex;gap:7px"><select id="spaid" style="flex:1;background:var(--bg);border:1px solid var(--brd2);border-radius:8px;padding:8px 10px;color:var(--txt);font-family:var(--ff);font-size:13px;outline:none;-webkit-appearance:none"><option value="jacob">Jacob paid</option><option value="b">B paid</option></select><button class="ab" style="flex:1;margin:0" data-cnt="'+items.length+'" onclick="addScan(+this.dataset.cnt)">Add All</button></div></div>';
    e.target.value='';
  }catch(err){toast('Error connecting to AI',true);out.innerHTML=''}
}
async function addScan(cnt){
  var p=document.getElementById('spaid').value,dt=td(),added=0,ps=[];
  for(var i=0;i<cnt;i++){var ne=document.getElementById('sn-'+i),ae=document.getElementById('sa-'+i),ce=document.getElementById('sc-'+i);if(!ne)continue;var n=ne.value.trim(),a=parseFloat(ae.value),t=ce.value;if(!n||isNaN(a)||a<=0)continue;ps.push(SB.from('expenses').insert({name:n,amount:a,paid:p,type:t,subcategory:'',expense_date:dt}));added++}
  await Promise.all(ps);
  if(added>0)toast(added+' expense'+(added>1?'s':'')+' added');else toast('No valid items',true);
  document.getElementById('scanout').innerHTML='';
}
